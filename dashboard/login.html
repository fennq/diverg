<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diverg — Sign in</title>
  <link rel="icon" href="/website/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #050508;
      --elevated:  #0a0a0f;
      --surface:   #0d0d14;
      --surface-2: #111118;
      --border:    rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.10);
      --text:      #ffffff;
      --muted:     #a0a0a8;
      --dim:       #4a4a56;
      --accent:    #3b6ff5;
      --accent-dim:rgba(59,111,245,0.10);
      --red:       #ef4444;
      --green:     #22c55e;
      --font:      'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      background: radial-gradient(circle, rgba(59,111,245,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    a, button { font-family: inherit; color: inherit; text-decoration: none; cursor: pointer; border: none; background: none; }
    input { font-family: inherit; color: var(--text); outline: none; }
    ::placeholder { color: var(--dim); }

    /* ── Container ─────────────────────────────────────────── */
    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      padding: 1.5rem;
    }

    /* ── Brand ─────────────────────────────────────────────── */
    .auth-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
    }
    .auth-brand img { height: 30px; width: auto; }
    .auth-brand-tag {
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 7px;
      border-radius: 4px;
      border: 1px solid rgba(59,111,245,0.15);
    }

    /* ── Header ─────────────────────────────────────────────── */
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-title {
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .auth-subtitle {
      font-size: 0.8125rem;
      color: var(--dim);
      line-height: 1.5;
    }

    /* ── Google button ──────────────────────────────────────── */
    .google-btn {
      width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.8125rem;
      font-weight: 450;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .google-btn:hover {
      background: var(--surface-2);
      border-color: var(--border-hi);
    }
    .google-btn:active { transform: scale(0.99); }
    .google-btn svg { flex-shrink: 0; }

    /* ── Divider ───────────────────────────────────────────── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-divider span {
      font-size: 0.6875rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Form fields ───────────────────────────────────────── */
    .auth-field {
      margin-bottom: 1rem;
    }
    .auth-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 450;
      color: var(--muted);
      margin-bottom: 0.375rem;
      letter-spacing: 0.01em;
    }
    .auth-input-wrap {
      position: relative;
    }
    .auth-field input[type="email"],
    .auth-field input[type="password"],
    .auth-field input[type="text"] {
      width: 100%;
      height: 44px;
      padding: 0 0.875rem;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.8125rem;
      transition: all 0.2s ease;
    }
    .auth-field input:hover { border-color: var(--border-hi); }
    .auth-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .pw-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      cursor: pointer;
      padding: 2px;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--muted); }

    /* ── Name field transition ──────────────────────────────── */
    .name-field {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      margin-bottom: 0;
      transition: max-height 0.3s ease, opacity 0.2s ease, margin-bottom 0.3s ease;
    }
    .name-field.show {
      max-height: 80px;
      opacity: 1;
      margin-bottom: 1rem;
    }

    /* ── Submit button ─────────────────────────────────────── */
    .auth-submit {
      width: 100%;
      height: 44px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 0.25rem;
      position: relative;
      overflow: hidden;
    }
    .auth-submit:hover { opacity: 0.88; }
    .auth-submit:active { transform: scale(0.99); }
    .auth-submit:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .auth-submit .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .auth-submit.loading .btn-text { display: none; }
    .auth-submit.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ──────────────────────────────────────────────── */
    .auth-error {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      font-size: 0.8125rem;
      color: var(--red);
      margin-bottom: 1rem;
      display: none;
      line-height: 1.4;
    }
    .auth-error.show { display: flex; align-items: center; gap: 0.5rem; }

    /* ── Footer toggle ─────────────────────────────────────── */
    .auth-footer {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.8125rem;
      color: var(--dim);
    }
    .auth-footer a {
      color: var(--text);
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
    }
    .auth-footer a:hover { color: var(--accent); }

    /* ── Legal ──────────────────────────────────────────────── */
    .auth-legal {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.6875rem;
      color: var(--dim);
      line-height: 1.6;
    }
    .auth-legal a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }
    .auth-legal a:hover { color: var(--text); }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 999; display: flex; flex-direction: column; gap: 0.5rem;
    }
    .toast {
      padding: 0.75rem 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.8125rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    .toast.ok { border-color: rgba(34,197,94,0.3); color: var(--green); }
    .toast.err { border-color: rgba(239,68,68,0.3); color: var(--red); }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 440px) {
      .auth-container { padding: 1rem; }
      .auth-brand { margin-bottom: 2rem; }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-brand">
      <img src="/dashboard/logo.png" alt="Diverg">
      <span class="auth-brand-tag">Console</span>
    </div>

    <div class="auth-header">
      <div class="auth-title" id="authTitle">Welcome back</div>
      <div class="auth-subtitle" id="authSubtitle">Sign in to your Diverg account</div>
    </div>

    <button class="google-btn" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-error" id="authError">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span id="authErrorText"></span>
    </div>

    <form id="authForm" onsubmit="handleAuth(event)" autocomplete="on">
      <div class="auth-field name-field" id="nameField">
        <label for="authName">Full name</label>
        <input type="text" id="authName" placeholder="Your name" autocomplete="name">
      </div>

      <div class="auth-field">
        <label for="authEmail">Email address</label>
        <input type="email" id="authEmail" placeholder="you@company.com" autocomplete="email" required>
      </div>

      <div class="auth-field">
        <label for="authPassword">Password</label>
        <div class="auth-input-wrap">
          <input type="password" id="authPassword" placeholder="Min 8 characters" autocomplete="current-password" required minlength="8">
          <div class="pw-toggle" onclick="togglePw()">
            <svg id="pwIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
        </div>
      </div>

      <button type="submit" class="auth-submit" id="authBtn">
        <span class="btn-text">Sign in</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="auth-footer">
      <span id="toggleText">No account?</span>
      <a id="toggleLink" onclick="toggleMode()">Create one</a>
    </div>

    <div class="auth-legal">
      By continuing, you agree to Diverg's<br>
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API = 'http://127.0.0.1:5000';
    let isRegister = false;

    if (localStorage.getItem('diverg_token')) {
      window.location.href = '/dashboard/';
    }

    function toggleMode() {
      isRegister = !isRegister;
      document.getElementById('authTitle').textContent = isRegister ? 'Create your account' : 'Welcome back';
      document.getElementById('authSubtitle').textContent = isRegister
        ? 'Start securing with Diverg'
        : 'Sign in to your Diverg account';
      document.getElementById('authBtn').querySelector('.btn-text').textContent = isRegister ? 'Create account' : 'Sign in';
      document.getElementById('toggleText').textContent = isRegister ? 'Already have an account?' : 'No account?';
      document.getElementById('toggleLink').textContent = isRegister ? 'Sign in' : 'Create one';
      document.getElementById('nameField').classList.toggle('show', isRegister);
      document.getElementById('authPassword').autocomplete = isRegister ? 'new-password' : 'current-password';
      document.getElementById('authPassword').placeholder = isRegister ? 'Create a password' : 'Min 8 characters';
      hideError();
    }

    function togglePw() {
      const inp = document.getElementById('authPassword');
      const showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      document.getElementById('pwIcon').innerHTML = showing
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      document.getElementById('authErrorText').textContent = msg;
      el.classList.add('show');
    }
    function hideError() {
      document.getElementById('authError').classList.remove('show');
    }

    async function handleAuth(e) {
      e.preventDefault();
      hideError();
      const btn = document.getElementById('authBtn');
      btn.disabled = true;
      btn.classList.add('loading');

      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const name = document.getElementById('authName').value.trim();

      const endpoint = isRegister ? '/api/auth/register' : '/api/auth/login';
      const body = isRegister ? { email, password, name } : { email, password };

      try {
        const r = await fetch(API + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json();

        if (!r.ok) {
          showError(data.error || 'Something went wrong');
          btn.disabled = false;
          btn.classList.remove('loading');
          return;
        }

        localStorage.setItem('diverg_token', data.token);
        localStorage.setItem('diverg_user', JSON.stringify(data.user));
        window.location.href = '/dashboard/';
      } catch {
        showError('Connection failed — is the server running?');
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    async function googleSignIn() {
      try {
        const tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: '',
          scope: 'openid email profile',
          callback: async (response) => {
            if (response.error) { showError('Google sign-in cancelled'); return; }
            try {
              const r = await fetch(API + '/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.access_token }),
              });
              const data = await r.json();
              if (!r.ok) { showError(data.error || 'Google sign-in failed'); return; }
              localStorage.setItem('diverg_token', data.token);
              localStorage.setItem('diverg_user', JSON.stringify(data.user));
              window.location.href = '/dashboard/';
            } catch { showError('Google sign-in failed'); }
          },
        });
        tokenClient.requestAccessToken();
      } catch {
        showError('Google sign-in not configured yet — use email');
      }
    }
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer onerror=""></script>
</body>
</html>
