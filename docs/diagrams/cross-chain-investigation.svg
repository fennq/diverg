<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="520"
     viewBox="0 0 1200 520">
  <defs>
    <marker id="arrow-cc" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6e7681"/>
    </marker>
  </defs>

  <!-- Background: numeric size only (no %), no external CSS -->
  <rect x="0" y="0" width="1200" height="520" fill="#0d1117"/>

  <text x="600" y="32" text-anchor="middle"
        fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold">
    Cross-chain investigation - Diverg
  </text>
  <text x="600" y="52" text-anchor="middle"
        fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="11">
    Hints only; verify on official bridges and explorers
  </text>

  <!-- Solana mint -->
  <rect x="40" y="76" width="200" height="56" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="140" y="104" text-anchor="middle" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">Solana mint</text>
  <text x="140" y="122" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">SPL token address</text>

  <!-- EVM contract -->
  <rect x="40" y="156" width="200" height="56" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="140" y="184" text-anchor="middle" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">EVM contract</text>
  <text x="140" y="202" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">per-chain via Etherscan v2</text>

  <!-- Wormhole -->
  <rect x="300" y="100" width="240" height="88" rx="8"
        fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="420" y="128" text-anchor="middle" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">Wormhole token list</text>
  <text x="420" y="146" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">CSV registry + cache</text>
  <text x="420" y="162" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">bridged address pairs</text>
  <text x="420" y="178" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">allowlisted bridge program IDs (Sol)</text>

  <!-- CoinGecko -->
  <rect x="300" y="216" width="240" height="72" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="420" y="244" text-anchor="middle" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">CoinGecko (optional)</text>
  <text x="420" y="262" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">contract / platform metadata</text>
  <text x="420" y="278" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">disk TTL cache</text>

  <!-- Merge hub -->
  <rect x="600" y="140" width="260" height="100" rx="10"
        fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="730" y="172" text-anchor="middle" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">cross_chain_hints</text>
  <text x="730" y="190" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">candidates + confidence_tier</text>
  <text x="730" y="206" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">foreign_explorer_url (Etherscan, Solscan, etc.)</text>
  <text x="730" y="222" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">summarize_cross_chain_payload</text>

  <!-- blockchain investigation -->
  <rect x="920" y="76" width="240" height="88" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="1040" y="104" text-anchor="middle" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold">blockchain_investigation</text>
  <text x="1040" y="122" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">crime_report.cross_chain</text>
  <text x="1040" y="138" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">Info finding + explorer links</text>

  <!-- Solana bundle -->
  <rect x="920" y="184" width="240" height="100" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="1040" y="212" text-anchor="middle" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">Solana bundle API</text>
  <text x="1040" y="230" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">cross_chain + summary</text>
  <text x="1040" y="246" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">bridge / mixer cluster signals</text>
  <text x="1040" y="262" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">focus-scoped bridge_adjacent</text>

  <!-- Footer -->
  <rect x="80" y="320" width="1040" height="72" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="600" y="348" text-anchor="middle" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">Does not prove misconduct</text>
  <text x="600" y="372" text-anchor="middle" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="10">
    Verify the same asset on another chain; corroborate with primary sources.
  </text>

  <text x="600" y="418" text-anchor="middle" fill="#6e7681" font-family="Arial, Helvetica, sans-serif" font-size="9">
    cross_chain_hints.py | blockchain_investigation.py | solana_bundle.py
  </text>

  <g stroke="#6e7681" stroke-width="1.5" fill="none" marker-end="url(#arrow-cc)">
    <line x1="240" y1="104" x2="300" y2="130"/>
    <line x1="240" y1="184" x2="280" y2="170"/>
    <line x1="420" y1="188" x2="420" y2="216"/>
    <line x1="540" y1="144" x2="600" y2="176"/>
    <line x1="540" y1="252" x2="620" y2="214"/>
    <line x1="860" y1="176" x2="920" y2="120"/>
    <line x1="860" y1="196" x2="920" y2="234"/>
  </g>
</svg>
