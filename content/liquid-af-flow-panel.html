<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>liquid.af — Wallet flow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e7e9ea;
      padding: 28px;
      min-height: 100vh;
    }
    .brand {
      position: absolute;
      top: 20px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand img { height: 26px; width: auto; }
    .brand-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: #58a6ff; }
    .wrap { max-width: 900px; margin: 0 auto; position: relative; }
    h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #8b949e; margin-bottom: 28px; }
    .flow {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px 20px;
      margin: 24px 0;
      justify-content: center;
    }
    .node {
      width: 110px;
      padding: 12px;
      border-radius: 50%;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      border: 2px solid;
      background: #161b22;
      flex-shrink: 0;
    }
    .node.primary { border-color: #f85149; color: #f85149; }
    .node.counterparty { border-color: #3fb950; color: #3fb950; }
    .node.wallet { border-color: #484f58; color: #58a6ff; }
    .node .small { font-size: 10px; font-weight: 400; color: #6e7681; margin-top: 4px; }
    .arrow { color: #30363d; font-size: 18px; flex-shrink: 0; }
    .edge-label { font-size: 10px; color: #6e7681; max-width: 90px; text-align: center; line-height: 1.3; }
    .foot { margin-top: 28px; font-size: 11px; color: #484f58; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="neuro-logo.png" alt="" />
      <span class="brand-tag">DIVERG SEC</span>
    </div>
    <h1>liquid.af — Wallet flow</h1>
    <p class="sub">Primary → wallets → counterparties. Solscan + Arkham.</p>

    <div class="flow">
      <div class="node primary">Primary</div>
      <div class="edge-label">transfers</div>
      <span class="arrow">→</span>
      <div class="node wallet">Wallet</div>
      <span class="arrow">→</span>
      <div class="node wallet">Wallet</div>
      <div class="edge-label">→ CEX</div>
      <span class="arrow">→</span>
      <div class="node counterparty">CEX</div>
    </div>

    <div class="foot">Diverg Sec</div>
  </div>
</body>
</html>
