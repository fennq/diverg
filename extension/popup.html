<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="popupHeader">
      <div class="logoRow">
        <span class="logoIcon">◇</span>
        <span class="logoText">Diverg</span>
      </div>
      <span class="betaBadge">BETA</span>
    </header>

    <div class="field urlRow">
      <input type="text" id="url" placeholder="https://example.com" />
      <button type="button" id="scanCurrent" class="btnIcon" title="Use current tab">↻</button>
    </div>

    <button type="button" id="scan" class="btnScan">↑ Run Security Scan</button>

    <div class="optionsArea">
      <div class="optionsLabel">Options</div>
      <label class="optionRow">
        <input type="checkbox" id="autoScan" />
        <span>Auto-scan on visit</span>
      </label>
      <a href="options.html" target="_blank" class="optionLink">Open full options</a>
    </div>

    <div id="status" class="status"></div>

    <div id="scanSummary" class="scanSummary" hidden>
      <div class="summaryHeader">
        <span class="summaryIcon">✓</span>
        <span class="summaryTitle">Scan Complete</span>
        <span id="summaryCount" class="summaryCount"></span>
      </div>
      <div id="summaryPills" class="summaryPills"></div>
      <a href="results.html" target="_blank" id="viewResults" class="viewReport">View detailed report →</a>
    </div>

    <footer class="popupFooter">Diverg Security Platform — Beta Release</footer>
  </div>
  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
