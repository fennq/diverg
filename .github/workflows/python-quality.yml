name: Python Quality

on:
  push:
    branches: [ main ]
    paths:
      - "**/*.py"
      - ".github/workflows/python-quality.yml"
  pull_request:
    paths:
      - "**/*.py"
      - ".github/workflows/python-quality.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint key backend modules
        run: |
          flake8 orchestrator.py api_server.py --max-line-length=120

      - name: Run strict filter regressions
        run: |
          pytest -q tests/test_strict_positive_filter.py

      - name: Run existing core tests
        run: |
          pytest -q tests/test_wallet_drainer_signals.py tests/test_facts_and_accuracy.py
